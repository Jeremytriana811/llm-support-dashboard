# ---------------------------------------------------------------------------
# docker-compose.yml — Run multiple containers together with one command.
#
# WHAT IS DOCKER COMPOSE?
# Instead of manually starting PostgreSQL, then the backend, then the
# frontend, docker-compose lets you define all services in one file
# and start everything with: docker-compose up
# ---------------------------------------------------------------------------

version: "3.9"

services:
  # -------------------------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------------------------
  db:
    image: postgres:16-alpine          # Official PostgreSQL image (small)
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_dashboard
    ports:
      - "5432:5432"                    # Expose on host so you can inspect
    volumes:
      - pgdata:/var/lib/postgresql/data  # Persist data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # FastAPI Backend
  # -------------------------------------------------------------------------
  backend:
    build: ./backend                   # Build from backend/Dockerfile
    restart: always
    environment:
      # Inside Docker, 'db' is the hostname of the PostgreSQL container
      DATABASE_URL: postgresql://postgres:postgres@db:5432/support_dashboard
      USE_REAL_MODELS: "true"
    ports:
      - "8000:8000"                    # http://localhost:8000
    depends_on:
      db:
        condition: service_healthy     # Wait for PostgreSQL to be ready

  # -------------------------------------------------------------------------
  # React Frontend (optional — you can also run it outside Docker)
  # -------------------------------------------------------------------------
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"                    # http://localhost:3000
    depends_on:
      - backend

volumes:
  pgdata:                              # Named volume for database persistence
